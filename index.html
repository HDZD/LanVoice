<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LanVoice — P2P Voice Chat</title>
    <meta name="description" content="Free peer-to-peer voice chat. Create a room, share the link, talk. No accounts, no downloads, no servers.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
    /* =============================================
       RESET & CUSTOM PROPERTIES
       ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #060810;
      --bg-primary: #0a0e1a;
      --bg-elevated: #111627;
      --bg-glass: rgba(14, 18, 34, 0.85);
      --bg-glass-light: rgba(255, 255, 255, 0.035);
      --bg-glass-lighter: rgba(255, 255, 255, 0.065);
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-medium: rgba(255, 255, 255, 0.1);
      --accent: #00d4aa;
      --accent-bright: #00f0c0;
      --accent-dim: rgba(0, 212, 170, 0.12);
      --accent-2: #6366f1;
      --accent-2-dim: rgba(99, 102, 241, 0.12);
      --text-bright: #f1f5f9;
      --text-primary: #cbd5e1;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --danger: #ef4444;
      --danger-dim: rgba(239, 68, 68, 0.12);
      --success: #22c55e;
      --warning: #f59e0b;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;
      --t-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --t-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
      --t-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* =============================================
       GLOBAL STYLES
       ============================================= */
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font);
      background: var(--bg-deep);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(ellipse at 25% 40%, rgba(99, 102, 241, 0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 25%, rgba(0, 212, 170, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(139, 92, 246, 0.04) 0%, transparent 50%);
      animation: bgShift 25s ease-in-out infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes bgShift {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(-3%, 2%) rotate(1deg); }
      66% { transform: translate(2%, -3%) rotate(-1deg); }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* =============================================
       SCREEN MANAGEMENT
       ============================================= */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--t-slow), visibility var(--t-slow);
    }
    .screen.active {
      opacity: 1;
      visibility: visible;
    }

    /* =============================================
       JOIN SCREEN
       ============================================= */
    .join-card {
      background: var(--bg-glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-xl);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      margin: 16px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
      animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo { text-align: center; margin-bottom: 36px; }
    .logo-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(0, 212, 170, 0.2);
    }
    .logo-icon svg { width: 32px; height: 32px; color: white; }

    .logo h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-bright), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .logo p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 4px;
      font-weight: 400;
    }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-glass-light);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-bright);
      font-family: var(--font);
      font-size: 15px;
      outline: none;
      transition: border-color var(--t-fast), box-shadow var(--t-fast);
    }
    .input::placeholder { color: var(--text-muted); }
    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--t-fast);
      outline: none;
      white-space: nowrap;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #00b89c);
      color: #000;
      box-shadow: 0 4px 16px rgba(0, 212, 170, 0.25);
    }
    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(0, 212, 170, 0.35);
      transform: translateY(-1px);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }

    .btn-secondary {
      background: var(--bg-glass-lighter);
      color: var(--text-bright);
      border: 1px solid var(--border-medium);
    }
    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .btn-danger {
      background: var(--danger-dim);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .btn-danger:hover:not(:disabled) {
      background: rgba(239, 68, 68, 0.2);
    }

    .btn-full { width: 100%; }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-subtle);
    }

    .join-row {
      display: flex;
      gap: 10px;
    }
    .join-row .input { flex: 1; }

    .error-text {
      color: var(--danger);
      font-size: 13px;
      margin-top: 8px;
      min-height: 20px;
    }

    /* =============================================
       ROOM SCREEN
       ============================================= */
    #room-screen {
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
    }

    .room-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-subtle);
      z-index: 10;
      flex-shrink: 0;
    }

    .room-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .room-code-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: var(--accent-dim);
      border: 1px solid rgba(0, 212, 170, 0.15);
      border-radius: var(--radius-full);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .copy-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg-glass-light);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      transition: all var(--t-fast);
    }
    .copy-link-btn:hover {
      color: var(--text-bright);
      border-color: var(--border-medium);
      background: var(--bg-glass-lighter);
    }
    .copy-link-btn svg { width: 14px; height: 14px; }

    .peer-count {
      color: var(--text-secondary);
      font-size: 13px;
    }

    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
      display: inline-block;
      margin-right: 4px;
    }

    /* Peer Grid */
    .peers-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
      padding-bottom: 100px;
    }

    .empty-room {
      text-align: center;
      padding: 60px 20px;
      animation: fadeIn 0.5s ease;
    }
    .empty-room-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: var(--bg-glass-lighter);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }
    .empty-room-icon svg { width: 36px; height: 36px; }
    .empty-room h3 {
      color: var(--text-secondary);
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .empty-room p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .peers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Peer Card */
    .peer-card {
      background: var(--bg-glass-light);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: all var(--t-normal);
      position: relative;
      animation: cardPop 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardPop {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .peer-card:hover {
      background: var(--bg-glass-lighter);
      transform: translateY(-2px);
    }

    .peer-card.speaking {
      border-color: rgba(0, 212, 170, 0.4);
      box-shadow: 0 0 20px rgba(0, 212, 170, 0.1), 0 0 60px rgba(0, 212, 170, 0.05);
    }

    .peer-card.is-self {
      border-color: rgba(99, 102, 241, 0.2);
    }
    .peer-card.is-self.speaking {
      border-color: rgba(0, 212, 170, 0.4);
    }

    .peer-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: white;
      position: relative;
      flex-shrink: 0;
    }

    .speaking-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0;
      transition: opacity var(--t-fast), transform var(--t-fast);
      transform: scale(0.92);
    }
    .peer-card.speaking .speaking-ring {
      opacity: 1;
      transform: scale(1);
      animation: pulseRing 2s ease-in-out infinite;
    }

    @keyframes pulseRing {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 170, 0.3); }
      50% { box-shadow: 0 0 0 6px rgba(0, 212, 170, 0); }
    }

    .peer-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-bright);
      text-align: center;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .peer-badges {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 22px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 600;
    }
    .badge-host {
      background: rgba(251, 191, 36, 0.12);
      color: #fbbf24;
      border: 1px solid rgba(251, 191, 36, 0.2);
    }
    .badge-you {
      background: var(--accent-2-dim);
      color: #a5b4fc;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }
    .badge-muted {
      background: var(--danger-dim);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.15);
    }

    .badge svg { width: 12px; height: 12px; }

    .kick-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--t-fast);
      opacity: 0;
    }
    .peer-card:hover .kick-btn { opacity: 1; }
    .kick-btn:hover {
      background: var(--danger-dim);
      border-color: rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }
    .kick-btn svg { width: 14px; height: 14px; }

    /* =============================================
       CONTROL BAR
       ============================================= */
    .control-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-full);
      padding: 10px 20px;
      display: flex;
      gap: 8px;
      align-items: center;
      z-index: 20;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .ctrl-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--bg-glass-lighter);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--t-fast);
      position: relative;
    }
    .ctrl-btn svg { width: 20px; height: 20px; }
    .ctrl-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--text-bright);
    }

    .ctrl-btn.active {
      background: var(--danger-dim);
      color: var(--danger);
    }
    .ctrl-btn.active:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .ctrl-btn.leave {
      background: var(--danger);
      color: white;
    }
    .ctrl-btn.leave:hover {
      background: #dc2626;
      box-shadow: 0 4px 16px rgba(239, 68, 68, 0.3);
    }

    .ctrl-divider {
      width: 1px;
      height: 24px;
      background: var(--border-subtle);
      margin: 0 4px;
    }

    .ctrl-btn .shortcut {
      position: absolute;
      bottom: -18px;
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 500;
      pointer-events: none;
      opacity: 0;
      transition: opacity var(--t-fast);
    }
    .ctrl-btn:hover .shortcut { opacity: 1; }

    /* =============================================
       SETTINGS MODAL
       ============================================= */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all var(--t-normal);
    }
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--bg-elevated);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-xl);
      padding: 32px;
      width: 100%;
      max-width: 400px;
      margin: 16px;
      transform: scale(0.95);
      transition: transform var(--t-normal);
    }
    .modal-overlay.active .modal { transform: scale(1); }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .modal-header h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-bright);
    }
    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--bg-glass-lighter);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--t-fast);
    }
    .modal-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-bright);
    }
    .modal-close svg { width: 16px; height: 16px; }

    .setting-group { margin-bottom: 20px; }
    .setting-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .select {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-glass-light);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-bright);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      appearance: none;
      cursor: pointer;
      transition: border-color var(--t-fast);
    }
    .select:focus { border-color: var(--accent); }

    .range-container { display: flex; align-items: center; gap: 12px; }
    .range-container input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: var(--border-subtle);
      border-radius: 2px;
      outline: none;
    }
    .range-container input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 212, 170, 0.3);
    }
    .range-value {
      font-size: 13px;
      color: var(--text-secondary);
      min-width: 36px;
      text-align: right;
    }

    /* =============================================
       TOAST NOTIFICATIONS
       ============================================= */
    .toast-container {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      padding: 12px 20px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transform: translateX(120%);
      opacity: 0;
      transition: all var(--t-normal);
      pointer-events: auto;
      max-width: 320px;
    }
    .toast.show {
      transform: translateX(0);
      opacity: 1;
    }
    .toast-info { border-left: 3px solid var(--accent); }
    .toast-success { border-left: 3px solid var(--success); }
    .toast-warning { border-left: 3px solid var(--warning); }
    .toast-error { border-left: 3px solid var(--danger); }

    /* =============================================
       LOADING SPINNER
       ============================================= */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* =============================================
       RESPONSIVE
       ============================================= */
    @media (max-width: 768px) {
      .join-card { padding: 32px 24px; }
      .room-header { padding: 12px 16px; }
      .room-info { gap: 10px; }
      .peers-area { padding: 16px; padding-bottom: 100px; }
      .peers-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
      .control-bar { padding: 8px 16px; }
      .ctrl-btn { width: 40px; height: 40px; }
    }

    @media (max-width: 480px) {
      .peers-grid { grid-template-columns: repeat(2, 1fr); }
      .room-info { flex-wrap: wrap; gap: 8px; }
      .peer-count { display: none; }
    }

    /* Topology badge */
    .topology-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: all var(--t-normal);
    }
    .topology-badge.mesh {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(0, 212, 170, 0.15);
    }
    .topology-badge.star {
      background: rgba(245, 158, 11, 0.1);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, 0.15);
    }
    .quality-hint {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Paranoid link */
    .paranoid-link-wrapper {
      text-align: center;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border-subtle);
    }
    .paranoid-link {

      color: var(--text-muted);

      text-shadow: 0 0 12px rgba(0, 212, 170, 0.3);
    }
    .paranoid-link:hover svg {
      transform: scale(1.15);
    }
    </style>
</head>
<body>

    <!-- ==========================================

    <!-- ==========================================

    <div id="settings-modal" class="modal-overlay">
        <div class="modal">
